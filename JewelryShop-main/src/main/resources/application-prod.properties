# =================== DATABASE ===================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# VNPAY Configuration - Reads from Environment Variables
vnp.tmncode=${VNP_TMNCODE}
vnp.hashsecret=${VNP_HASHSECRET}
#MOMO Configuration
momo.partnerCode=${MOMO_PARTNERCODE}
momo.accessKey=${MOMO_ACCESSKEY}
momo.secretKey=${MOMO_SECRETKEY}
# =================== OTP ===================
app.otp.ttl-minutes=${APP_OTP_TTL_MINUTES:2}

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json
server.compression.min-response-size=1024
spring.web.resources.cache.period=3600
spring.web.resources.chain.cache=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

#Image
file.upload-dir=./uploads/

# =================== SSL/HTTPS (Production) ===================
# ✅ Sử dụng environment variables cho keystore path
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-alias=${SSL_KEY_ALIAS:tomcat}
server.ssl.enabled=true

# =================== Email Configuration (Production) ===================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =================== HTTP/2 Support ===================
server.http2.enabled=true

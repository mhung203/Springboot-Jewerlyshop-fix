spring.application.name=jwelery
# ✅ HTTPS - Server sẽ lắng nghe trên cổng 8443 (HTTPS)
# HTTP (8080) sẽ được tự động redirect sang HTTPS (8443)
server.port=${PORT:8443}
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.profiles.active=dev

# ===== File upload limits =====
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# ===== SSL/HTTPS Configuration (Mặc định, sẽ override trong application-*.properties) =====
server.ssl.enabled=true
server.ssl.key-store-type=PKCS12
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# ===== Security Headers cho HTTPS =====
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.path=/